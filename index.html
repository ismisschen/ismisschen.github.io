<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<title>爱心雨</title>
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style>
		/* css样式 */
		* {
			/* 通配符: 选择到所有的标签元素*/
			margin: 0;
			/*外边距*/
			padding: 0;
			/*内边距*/
		}

		html {
			height: 100%;
			/*相对于浏览器来计算*/
		}

		body {
			/*标签选择器*/
			height: 100%;
			/*相对于父元素的高度计算*/
			background: url("images/1.jpg") repeat-x center;
			/*添加背景图片*/
			background-size: 100% 100%;
			/*背景尺寸：左右 上下*/
			overflow: hidden;
			/*超出隐藏*/
		}

		/*爱心飘落*/
		.snowfall-flakes {
			position: relative;
			width: 10px;
			height: 16px;
		}

		.snowfall-flakes:before,
		.snowfall-flakes:after {
			content: "";
			position: absolute;
			left: 0px;
			top: 0px;
			display: block;
			width: 10px;
			height: 16px;
			background: pink;
			border-radius: 10px 10px 0 0;
			transform: rotate(-45deg);
		}

		.snowfall-flakes:after {
			left: 4px;
			transform: rotate(45deg);
		}

		.btn {
			width: 50px;
			height: 50px;
			background: url("images/0.png");
			border-radius: 50%;
		}
	</style>
</head>

<body>
	<!--身体-->
	<!--div 盒子模型标签 宽度 高度 位置-->
	<div class="btn"></div>
	<audio id="music" src="2.mp3" loop="true"></audio>
	<script src="js/jquery-1.2.6.min.js"></script>
	<script src="js/snowfall.jquery.js"></script>
	<script>
		//调用飘落函数 实现飘落效果
		$(document).snowfall({
			flakeCount: 100 //爱心的个数
		});
		//点击实现音乐播放功能
		//$(".btn") 选中btn这个按钮标签
		var onOff = true;
		$(".btn").click(function () { //点击实现什么功能
			//get(0) 转换为dom节点
			if (onOff) //若果onOff= true
			{
				$("#music").get(0).play(); //播放音乐  play()原生dom提供的api接口
				onOff = false;
			} else {
				$("#music").get(0).pause(); //暂停歌曲
				onOff = true;
			}

		});
	</script>
</body>

</html>
